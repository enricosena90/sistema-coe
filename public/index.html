<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema Profissional</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  background: #05080f;
  color: #fff;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #0a0f1a;
  height: 100vh;
  padding: 20px;
  border-right: 1px solid #111;
}

.logo {
  font-weight: bold;
  color: #facc15;
  margin-bottom: 30px;
}

.menu-item {
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
  color: #94a3b8;
}

.menu-item.active {
  background: #facc15;
  color: #000;
  font-weight: bold;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 30px;
}

/* CARD */
.card {
  background: #0f172a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  border-left: 4px solid #3b82f6;
}

.card.yellow { border-left-color: #facc15; }
.card.red { border-left-color: #ef4444; }

.card h3 {
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 220px;
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #1e293b;
  background: #020617;
  color: #fff;
}

/* BUTTON */
button {
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #1e293b;
}

th {
  color: #38bdf8;
  text-align: left;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🚔 ELITE COE</div>
  <div class="menu-item active">Relatório</div>
  <div class="menu-item">Viaturas</div>
  <div class="menu-item">Ranking</div>
</div>

<div class="content">

<div class="card">
  <h3>Composição da Equipe</h3>
  <div class="grid">
    <input id="chefe" placeholder="Chefe da Barca">
    <input id="p1" placeholder="Motorista P1">
    <input id="p3" placeholder="Auxiliar P3">
    <input id="p4" placeholder="Auxiliar P4">
  </div>
</div>

<div class="card yellow">
  <h3>Dados da Ronda</h3>
  <input id="vtr" placeholder="Viatura">
  <input type="datetime-local" id="inicio">
  <input type="datetime-local" id="fim">
</div>

<div class="card red">
  <h3>Produtividade</h3>
  <input placeholder="Veículos">
  <input placeholder="Drogas">
  <input placeholder="Armas">
  <input placeholder="Munições">
</div>

<div class="card">
  <button onclick="salvar()">Salvar Relatório</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Chefe</th>
<th>P1</th>
<th>P3</th>
<th>P4</th>
<th>VTR</th>
<th>Início</th>
<th>Fim</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];

function salvar() {
  dados.push({
    chefe: chefe.value,
    p1: p1.value,
    p3: p3.value,
    p4: p4.value,
    vtr: vtr.value,
    inicio: inicio.value,
    fim: fim.value
  });

  localStorage.setItem("dados", JSON.stringify(dados));
  atualizar();
}

function atualizar() {
  tabela.innerHTML = "";
  dados.forEach(d => {
    tabela.innerHTML += `
      <tr>
        <td>${d.chefe}</td>
        <td>${d.p1}</td>
        <td>${d.p3}</td>
        <td>${d.p4}</td>
        <td>${d.vtr}</td>
        <td>${d.inicio}</td>
        <td>${d.fim}</td>
      </tr>
    `;
  });
}

atualizar();
</script>

</body>
</html>
