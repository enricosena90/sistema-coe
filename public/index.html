<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema 💀</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    display:flex;
    background:#010b05;
    color:white;
}

/* SIDEBAR */
.sidebar {
    width:230px;
    background:#0b1e10;
    border-right:3px solid #22c55e;
    height:100vh;
    position:fixed;
    padding:20px 10px;
    box-sizing:border-box;
}
.logo {
    color:#22c55e;
    font-weight:bold;
    font-size:20px;
    margin-bottom:20px;
    text-align:center;
}
.menu-item {
    padding:12px 10px;
    margin:8px 0;
    border-radius:6px;
    cursor:pointer;
    transition:.2s;
    font-weight:bold;
    text-align:center;
    border:1px solid #22c55e;
    background:#0b1e10;
}
.menu-item:hover {
    background:#22c55e;
    color:#010b05;
    transform:scale(1.02);
    box-shadow:0 0 10px #22c55e;
}

/* CONTENT */
.content {
    margin-left:240px;
    padding:20px;
}

/* CARD */
.card {
    background:#0b1e10;
    border:2px solid #22c55e;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 0 15px #22c55e inset,0 0 15px #010b05;
}

/* GRID */
.grid {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.grid div {
    flex:1 1 200px;
}

/* INPUTS */
input, select {
    width:100%;
    padding:10px;
    margin:6px 0;
    background:#010b05;
    color:#22c55e;
    border:2px solid #22c55e;
    border-radius:6px;
    font-weight:bold;
    box-sizing:border-box;
}

/* BUTTON */
button {
    padding:10px 20px;
    background:#22c55e;
    color:#010b05;
    border:none;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
    border-radius:6px;
    transition:.2s;
}
button:hover {
    background:#1c7b46;
    transform:scale(1.05);
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
th, td {
    border-bottom:1px solid #22c55e;
    padding:8px;
    text-align:center;
    font-size:12px;
    font-weight:bold;
}
th {
    background:#0b1e10;
}

/* LOGIN */
.login {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box {
    background:#0b1e10;
    border:2px solid #22c55e;
    padding:40px;
    border-radius:14px;
    box-shadow:0 0 20px #22c55e;
    text-align:center;
}

/* GRAFICO */
#grafico {
    margin-top:20px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="box">
    <h2>💀 COE Login</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="logar()">Entrar</button>
  </div>
</div>

<!-- SISTEMA -->
<div id="sistema" style="display:none;">

<div class="sidebar">
  <div class="logo">💀 COE</div>
  <div class="menu-item" onclick="mostrar('relatorio')">Relatório</div>
  <div class="menu-item" onclick="mostrar('ranking')">Ranking</div>
  <div class="menu-item" onclick="mostrar('mensal')">Ranking Mensal</div>
  <div class="menu-item" onclick="mostrar('individual')">Ranking Individual</div>
  <div class="menu-item" onclick="mostrar('cadastro')" id="menuCadastro">Cadastro</div>
  <div class="menu-item" onclick="resetarSistema()" id="menuReset" style="color:red;">Reset</div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">
  <div class="card">
    <h3>Equipe</h3>
    <div class="grid">
      <div><label>Chefe da Barca</label><select id="chefe"></select></div>
      <div><label>P1</label><select id="p1"></select></div>
      <div><label>P3</label><select id="p3"></select></div>
      <div><label>P4</label><select id="p4"></select></div>
    </div>
  </div>

  <div class="card">
    <h3>Ronda</h3>
    <div class="grid">
      <input id="vtr" placeholder="Viatura">
      <input type="date" id="data">
      <input type="time" id="inicio">
      <input type="time" id="fim">
    </div>
  </div>

  <div class="card">
    <h3>Produtividade</h3>
    <div class="grid">
      <input id="veiculos" placeholder="Veículos">
      <input id="drogas" placeholder="Drogas">
      <input id="fuzil" placeholder="Fuzil">
      <input id="pistola" placeholder="Pistola">
      <input id="smg" placeholder="SMG">
      <input id="explosivos" placeholder="Explosivos">
      <input id="dinheiro" placeholder="Dinheiro Sujo">
      <input id="municoes" placeholder="Munições">
    </div>
  </div>

  <button onclick="salvar()">Salvar</button>
  <canvas id="grafico"></canvas>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
  <button onclick="resetRanking()" style="background:red;color:white;">Reset Ranking</button>
  <table>
    <thead>
      <tr>
        <th>#</th><th>Nome</th><th>Pts</th>
        <th>Veículos</th><th>Drogas</th><th>Fuzil</th><th>Pistola</th><th>SMG</th><th>Explosivos</th><th>Dinheiro</th><th>Munições</th>
      </tr>
    </thead>
    <tbody id="rankingTabela"></tbody>
  </table>
</div>

<!-- MENSAL -->
<div id="mensal" style="display:none;">
  <input type="month" id="mes" onchange="rankingMensal()">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Nome</th><th>Pts</th>
        <th>Veículos</th><th>Drogas</th><th>Fuzil</th><th>Pistola</th><th>SMG</th><th>Explosivos</th><th>Dinheiro</th><th>Munições</th>
      </tr>
    </thead>
    <tbody id="mensalTabela"></tbody>
  </table>
</div>

<!-- INDIVIDUAL -->
<div id="individual" style="display:none;">
  <table>
    <thead>
      <tr>
        <th>#</th><th>Nome</th><th>Pts</th>
      </tr>
    </thead>
    <tbody id="individualTabela"></tbody>
  </table>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none;">
  <input id="nome" placeholder="Nome">
  <input id="patente" placeholder="Patente">
  <input id="cargo" placeholder="Cargo">
  <input id="rg" placeholder="RG">
  <button onclick="cadastrar()">Cadastrar</button>
  <table>
    <thead>
      <tr>
        <th>Nome</th>
        <th>Patente</th>
        <th>Cargo</th>
        <th>RG</th>
        <th>Excluir</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBiv7jmqW6ELU6yxCSu7n18Qy_SHrbRmw4",
  authDomain:"sistema-coe-ff00a.firebaseapp.com",
  projectId:"sistema-coe-ff00a"
});
const db = getFirestore(app);

let dados=[];
let grafico;

/* FORMATA NUMEROS */
function formatNum(n){return n.toLocaleString('pt-BR');}

/* LOGIN */
window.logar = ()=>{
  let u=user.value;
  let s=pass.value;
  if(u==="oficial" && s==="1510"){localStorage.setItem("nivel","oficial");}
  else if(u==="praça" && s==="1234"){localStorage.setItem("nivel","praca");}
  else return alert("Erro de login");
  login.style.display="none";
  sistema.style.display="block";
  configPermissao();
};
function configPermissao(){
  let nivel=localStorage.getItem("nivel");
  if(nivel!=="oficial"){menuCadastro.style.display="none";menuReset.style.display="none";}
}

/* CADASTRO */
window.cadastrar=async()=>{
  await addDoc(collection(db,"policiais"),{
    nome:nome.value,
    patente:patente.value,
    cargo:cargo.value,
    rg:rg.value
  });
};

/* EXCLUIR */
window.excluir=id=>{
  if(confirm("Excluir policial?")) deleteDoc(doc(db,"policiais",id));
};

/* RESET SISTEMA */
window.resetarSistema=async()=>{
  if(prompt("Senha")!=="1510") return;
  let p=await getDocs(collection(db,"policiais")); p.forEach(d=>deleteDoc(doc(db,"policiais",d.id)));
  let r=await getDocs(collection(db,"relatorios")); r.forEach(d=>deleteDoc(doc(db,"relatorios",d.id)));
};

/* RESET RANKING */
window.resetRanking=async()=>{
  if(!confirm("Confirma reset do Ranking?")) return;
  let r=await getDocs(collection(db,"relatorios")); r.forEach(d=>{
    deleteDoc(doc(db,"relatorios",d.id));
  });
};

/* TEMPO REAL */
window.onload=()=>{
  onSnapshot(collection(db,"policiais"),snap=>{
    lista.innerHTML="";
    chefe.innerHTML=p1.innerHTML=p3.innerHTML=p4.innerHTML="<option></option>";
    snap.forEach(d=>{
      let p=d.data();
      lista.innerHTML+=`<tr>
        <td>${p.nome}</td>
        <td>${p.patente}</td>
        <td>${p.cargo||"-"}</td>
        <td>${p.rg}</td>
        <td><button onclick="excluir('${d.id}')">🗑️</button></td>
      </tr>`;
      [chefe,p1,p3,p4].forEach(s=>s.innerHTML+=`<option>${p.nome}</option>`);
    });
  });
  onSnapshot(collection(db,"relatorios"),snap=>{
    dados=[]; snap.forEach(d=>dados.push(d.data()));
    ranking();
    rankingMensal();
    rankingIndividual();
    graf();
  });
};

/* SALVAR */
window.salvar=async()=>{
  let d={chefe:chefe.value,p1:p1.value,p3:p3.value,p4:p4.value,vtr:vtr.value,data:data.value,inicio:inicio.value,fim:fim.value,
    veiculos:+veiculos.value||0,drogas:+drogas.value||0,fuzil:+fuzil.value||0,pistola:+pistola.value||0,smg:+smg.value||0,
    explosivos:+explosivos.value||0,dinheiro:+dinheiro.value||0,municoes:+municoes.value||0
  };

  let pontosBase = d.veiculos*25+d.drogas*15+d.fuzil*40+d.pistola*10+d.smg*15+d.explosivos*15+d.dinheiro*0.2+d.municoes*5;

  let pontosTempo = 0;
  if(d.inicio && d.fim){
    let [h1,m1]=d.inicio.split(":").map(Number);
    let [h2,m2]=d.fim.split(":").map(Number);
    let minutos=(h2*60+m2)-(h1*60+m1);
    if(minutos<0) minutos=0;
    pontosTempo=minutos*2;
  }

  d.pontos = pontosBase + pontosTempo;
  await addDoc(collection(db,"relatorios"),d);
};

/* RANKING */
function ranking(){
  let r={};
  dados.forEach(d=>{
    [d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
      if(!p) return;
      if(!r[p]) r[p]={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0,pontos:0};
      r[p].veiculos += d.veiculos||0;
      r[p].drogas += d.drogas||0;
      r[p].fuzil += d.fuzil||0;
      r[p].pistola += d.pistola||0;
      r[p].smg += d.smg||0;
      r[p].explosivos += d.explosivos||0;
      r[p].dinheiro += d.dinheiro||0;
      r[p].municoes += d.municoes||0;
      r[p].pontos += d.pontos;
    });
  });

  let ord=Object.entries(r).sort((a,b)=>b[1].pontos-a[1].pontos);
  rankingTabela.innerHTML="";
  ord.forEach((e,i)=>{
    let d=e[1];
    rankingTabela.innerHTML+=`<tr>
      <td>${i+1}</td>
      <td>${e[0]}</td>
      <td>${formatNum(d.pontos.toFixed(1))}</td>
      <td>${formatNum(d.veiculos)}</td>
      <td>${formatNum(d.drogas)}</td>
      <td>${formatNum(d.fuzil)}</td>
      <td>${formatNum(d.pistola)}</td>
      <td>${formatNum(d.smg)}</td>
      <td>${formatNum(d.explosivos)}</td>
      <td>${formatNum(d.dinheiro)}</td>
      <td>${formatNum(d.municoes)}</td>
    </tr>`;
  });
}

/* RANKING MENSAL */
window.rankingMensal=()=>{
  let m=mes.value;
  let r={};
  dados.forEach(d=>{
    if(d.data && d.data.startsWith(m)){
      [d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
        if(!p) return;
        if(!r[p]) r[p]={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0,pontos:0};
        r[p].veiculos += d.veiculos||0;
        r[p].drogas += d.drogas||0;
        r[p].fuzil += d.fuzil||0;
        r[p].pistola += d.pistola||0;
        r[p].smg += d.smg||0;
        r[p].explosivos += d.explosivos||0;
        r[p].dinheiro += d.dinheiro||0;
        r[p].municoes += d.municoes||0;
        r[p].pontos += d.pontos;
      });
    }
  });

  let ord=Object.entries(r).sort((a,b)=>b[1].pontos-a[1].pontos);
  mensalTabela.innerHTML="";
  ord.forEach((e,i)=>{
    let d=e[1];
    mensalTabela.innerHTML+=`<tr>
      <td>${i+1}</td>
      <td>${e[0]}</td>
      <td>${formatNum(d.pontos.toFixed(1))}</td>
      <td>${formatNum(d.veiculos)}</td>
      <td>${formatNum(d.drogas)}</td>
      <td>${formatNum(d.fuzil)}</td>
      <td>${formatNum(d.pistola)}</td>
      <td>${formatNum(d.smg)}</td>
      <td>${formatNum(d.explosivos)}</td>
      <td>${formatNum(d.dinheiro)}</td>
      <td>${formatNum(d.municoes)}</td>
    </tr>`;
  });
};

/* RANKING INDIVIDUAL SIMPLES */
function rankingIndividual(){
  let r={};
  dados.forEach(d=>{[d.chefe,d.p1,d.p3,d.p4].forEach(p=>{if(!p)return;r[p]=(r[p]||0)+d.pontos;});});
  individualTabela.innerHTML="";
  Object.entries(r).forEach((e,i)=>{individualTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${formatNum(e[1].toFixed(1))}</td></tr>`;});
}

/* GRAFICO */
function graf(){
  let t={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0};
  dados.forEach(d=>Object.keys(t).forEach(k=>t[k]+=d[k]));
  if(grafico) grafico.destroy();
  grafico=new Chart(document.getElementById("grafico"),{
    type:"bar",
    data:{labels:Object.keys(t),datasets:[{data:Object.values(t),backgroundColor:['#22c55e','#1c7b46','#16a34a','#4ade80','#22c55e','#1c7b46','#16a34a','#4ade80']}]},
    options:{plugins:{legend:{display:false}}}
  });
}

/* NAV */
window.mostrar=id=>{
  ["relatorio","ranking","mensal","individual","cadastro"].forEach(p=>document.getElementById(p).style.display="none");
  document.getElementById(id).style.display="block";
};
</script>
</body>
</html>
