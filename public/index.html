<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #05080f;
  color: #fff;
}

.sidebar {
  width: 240px;
  background: #0a0f1a;
  height: 100vh;
  padding: 20px;
}

.logo {
  color: #facc15;
  margin-bottom: 20px;
  font-weight: bold;
}

.menu-item {
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

.menu-item:hover {
  background: #facc15;
  color: #000;
}

.content {
  flex: 1;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.grid div {
  flex: 1 1 180px;
}

label {
  display: block;
  margin-bottom: 5px;
  font-size: 13px;
  color: #94a3b8;
}

input, select {
  width: 100%;
  padding: 10px;
  border-radius: 5px;
  border: none;
  background: #020617;
  color: white;
}

button {
  padding: 10px 15px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
  margin-top: 10px;
}

.reset-btn { background: #ef4444; }
.delete-btn { background: #ef4444; }

table {
  width: 100%;
  border-collapse: collapse;
  background: #020617;
}

th, td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #1e293b;
}

th { color: #38bdf8; }

tr:hover { background: #0f172a; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🚔 COE</div>
  <div class="menu-item" onclick="mostrarRelatorio()">Relatório</div>
  <div class="menu-item" onclick="mostrarRanking()">Ranking</div>
  <div class="menu-item" onclick="mostrarRankingMensal()">Ranking Mensal</div>
  <div class="menu-item" onclick="mostrarRankingIndividual()">Ranking Individual</div>
  <div class="menu-item" onclick="mostrarCadastro()">Cadastro</div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">

<div class="card">
<h3>Equipe</h3>
<div class="grid">

<div>
<label>Chefe da Barca</label>
<select id="chefeSelect"></select>
</div>

<div>
<label>P1</label>
<select id="p1Select"></select>
</div>

<div>
<label>P3</label>
<select id="p3Select"></select>
</div>

<div>
<label>P4</label>
<select id="p4Select"></select>
</div>

</div>
</div>

<div class="card">
<h3>Ronda</h3>
<div class="grid">
<input id="vtr" placeholder="VTR">
<input type="date" id="data">
<input type="time" id="inicio">
<input type="time" id="fim">
</div>
</div>

<div class="card">
<h3>Produtividade</h3>
<div class="grid">
<input id="veiculos" type="number" placeholder="Veículos">
<input id="drogas" type="number" placeholder="Drogas">
<input id="fuzil" type="number" placeholder="Fuzil">
<input id="pistola" type="number" placeholder="Pistola">
<input id="smg" type="number" placeholder="SMG">
<input id="explosivos" type="number" placeholder="Explosivos">
<input id="dinheiro" type="number" placeholder="Dinheiro Sujo">
<input id="municoes" type="number" placeholder="Munições">
</div>
</div>

<button onclick="salvar()">Salvar Relatório</button>
<button onclick="resetarDados()" class="reset-btn">🗑️ Resetar Sistema</button>

</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">

<div class="card">
<h3>🏆 Ranking</h3>
<table>
<thead>
<tr><th>Posição</th><th>Chefe</th><th>Pontos</th></tr>
</thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>

<div class="card">
<h3>📊 Pontuação</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📊 Produtividade por Tipo</h3>
<canvas id="graficoTipos"></canvas>
</div>

</div>

<!-- RANKING MENSAL -->
<div id="rankingMensal" style="display:none;">
<div class="card">
<h3>Ranking Mensal</h3>
<input type="month" id="mesFiltro" onchange="gerarRankingMensal()">
<table>
<thead>
<tr><th>Posição</th><th>Chefe</th><th>Pontos</th></tr>
</thead>
<tbody id="rankingMensalTabela"></tbody>
</table>
</div>
</div>

<!-- RANKING INDIVIDUAL -->
<div id="rankingIndividual" style="display:none;">
<div class="card">
<h3>👮 Ranking Individual</h3>
<table>
<thead>
<tr><th>Posição</th><th>Policial</th><th>Pontos</th></tr>
</thead>
<tbody id="rankingIndividualTabela"></tbody>
</table>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none;">
<div class="card">
<h3>Cadastro de Policiais</h3>

<div class="grid">
<input id="nomePolicial" placeholder="Nome">
<input id="rgPolicial" placeholder="RG">
</div>

<button onclick="cadastrarPolicial()">Cadastrar</button>

<table>
<thead>
<tr><th>Nome</th><th>RG</th><th>Ação</th></tr>
</thead>
<tbody id="listaPoliciais"></tbody>
</table>

</div>
</div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let policiais = JSON.parse(localStorage.getItem("policiais")) || [];
let grafico, graficoTipos;

/* CADASTRO */
function cadastrarPolicial() {
  if (!nomePolicial.value || !rgPolicial.value) return;

  if (policiais.some(p => p.rg === rgPolicial.value)) {
    alert("RG já existe");
    return;
  }

  policiais.push({ nome: nomePolicial.value, rg: rgPolicial.value });
  localStorage.setItem("policiais", JSON.stringify(policiais));

  atualizarPoliciais();
  atualizarSelects();

  nomePolicial.value="";
  rgPolicial.value="";
}

function excluirPolicial(rg) {
  policiais = policiais.filter(p => p.rg !== rg);
  localStorage.setItem("policiais", JSON.stringify(policiais));
  atualizarPoliciais();
  atualizarSelects();
}

function atualizarPoliciais() {
  listaPoliciais.innerHTML="";
  policiais.forEach(p=>{
    listaPoliciais.innerHTML += `
    <tr>
      <td>${p.nome}</td>
      <td>${p.rg}</td>
      <td><button class="delete-btn" onclick="excluirPolicial('${p.rg}')">Excluir</button></td>
    </tr>`;
  });
}

function atualizarSelects() {
  let selects=[chefeSelect,p1Select,p3Select,p4Select];

  selects.forEach(s=>{
    s.innerHTML="<option value=''>Selecionar</option>";
    policiais.forEach(p=>{
      s.innerHTML+=`<option value="${p.nome}">${p.nome} (${p.rg})</option>`;
    });
  });
}

/* PONTOS */
function calcularPontos(d) {
  return d.veiculos*25 + d.drogas*15 + d.fuzil*40 + d.pistola*10 +
         d.smg*15 + d.explosivos*15 + d.dinheiro*0.2 + d.municoes*5;
}

/* SALVAR */
function salvar() {
  if (!chefeSelect.value) return alert("Selecione o chefe");

  let r={
    chefe:chefeSelect.value,
    p1:p1Select.value,
    p3:p3Select.value,
    p4:p4Select.value,
    data:data.value,
    veiculos:+veiculos.value||0,
    drogas:+drogas.value||0,
    fuzil:+fuzil.value||0,
    pistola:+pistola.value||0,
    smg:+smg.value||0,
    explosivos:+explosivos.value||0,
    dinheiro:+dinheiro.value||0,
    municoes:+municoes.value||0
  };

  r.pontos=calcularPontos(r);

  dados.push(r);
  localStorage.setItem("dados", JSON.stringify(dados));

  gerarRanking();
  gerarRankingMensal();
}

/* RESET */
function resetarDados() {
  let senha=prompt("Senha:");
  if(senha==="1234"){
    localStorage.clear();
    dados=[]; policiais=[];
    atualizarPoliciais();
    atualizarSelects();
    gerarRanking();
  } else alert("Senha incorreta");
}

/* RANKING */
function gerarRanking() {
  let r={};
  dados.forEach(d=>{
    if(!r[d.chefe]) r[d.chefe]=0;
    r[d.chefe]+=d.pontos;
  });

  let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);

  rankingTabela.innerHTML="";
  ord.forEach((e,i)=>{
    let m=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
    rankingTabela.innerHTML+=`<tr><td>${m} ${i+1}</td><td>${e[0]}</td><td>${e[1]}</td></tr>`;
  });

  gerarGrafico(ord);
  gerarGraficoTipos();
}

/* GRAFICOS */
function gerarGrafico(lista){
  if(grafico)grafico.destroy();
  grafico=new Chart(grafico=document.getElementById("grafico"),{
    type:"bar",
    data:{labels:lista.map(x=>x[0]),datasets:[{data:lista.map(x=>x[1])}]},
    options:{plugins:{legend:{display:false}}}
  });
}

function gerarGraficoTipos(){
  let t={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0};

  dados.forEach(d=>{
    Object.keys(t).forEach(k=>t[k]+=d[k]||0);
  });

  if(graficoTipos)graficoTipos.destroy();

  graficoTipos=new Chart(document.getElementById("graficoTipos"),{
    type:"pie",
    data:{labels:Object.keys(t),datasets:[{data:Object.values(t)}]}
  });
}

/* INDIVIDUAL */
function gerarRankingIndividual(){
  let r={};

  dados.forEach(d=>{
    [d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
      if(!p)return;
      if(!r[p])r[p]=0;
      r[p]+=d.pontos/4;
    });
  });

  let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);

  rankingIndividualTabela.innerHTML="";
  ord.forEach((e,i)=>{
    let m=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
    rankingIndividualTabela.innerHTML+=`<tr><td>${m} ${i+1}</td><td>${e[0]}</td><td>${e[1].toFixed(1)}</td></tr>`;
  });
}

/* MENSAL */
function gerarRankingMensal(){
  let mes=mesFiltro.value;
  if(!mes)return;

  let r={};
  dados.forEach(d=>{
    if(d.data && d.data.startsWith(mes)){
      if(!r[d.chefe])r[d.chefe]=0;
      r[d.chefe]+=d.pontos;
    }
  });

  let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);

  rankingMensalTabela.innerHTML="";
  ord.forEach((e,i)=>{
    rankingMensalTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${e[1]}</td></tr>`;
  });
}

/* NAV */
function mostrarRelatorio(){relatorio.style.display="block";ranking.style.display="none";rankingMensal.style.display="none";cadastro.style.display="none";rankingIndividual.style.display="none";}
function mostrarRanking(){relatorio.style.display="none";ranking.style.display="block";rankingMensal.style.display="none";cadastro.style.display="none";rankingIndividual.style.display="none";}
function mostrarRankingMensal(){relatorio.style.display="none";ranking.style.display="none";rankingMensal.style.display="block";cadastro.style.display="none";rankingIndividual.style.display="none";}
function mostrarCadastro(){relatorio.style.display="none";ranking.style.display="none";rankingMensal.style.display="none";cadastro.style.display="block";rankingIndividual.style.display="none";}
function mostrarRankingIndividual(){relatorio.style.display="none";ranking.style.display="none";rankingMensal.style.display="none";cadastro.style.display="none";rankingIndividual.style.display="block";gerarRankingIndividual();}

/* INIT */
atualizarPoliciais();
atualizarSelects();
gerarRanking();
</script>

</body>
</html>
