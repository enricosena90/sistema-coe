<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema COE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; display:flex; background:#05080f; color:#fff;}
.sidebar { width:240px; background:#0a0f1a; height:100vh; padding:20px;}
.logo { color:#22c55e; margin-bottom:20px; font-weight:bold;}
.menu-item { padding:10px; cursor:pointer; border-radius:5px;}
.menu-item:hover { background:#22c55e; color:#000;}
.content { flex:1; padding:20px;}
.card { background:#0f172a; padding:20px; border-radius:10px; margin-bottom:20px;}
.grid { display:flex; flex-wrap:wrap; gap:10px;}
.grid div { flex:1 1 180px;}
input, select { width:100%; padding:10px; border-radius:5px; border:none; background:#020617; color:white;}
button { padding:10px; background:#22c55e; border:none; border-radius:5px; cursor:pointer;}
table { width:100%; border-collapse:collapse; background:#020617;}
th, td { padding:10px; text-align:center;}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🚔 COE</div>
  <div class="menu-item" onclick="mostrar('relatorio')">Relatório</div>
  <div class="menu-item" onclick="mostrar('ranking')">Ranking</div>
  <div class="menu-item" onclick="mostrar('cadastro')">Cadastro</div>
</div>

<div class="content">

<div id="relatorio">
<div class="card">
<select id="chefe"></select>
<input id="veiculos" placeholder="Veículos">
<input id="drogas" placeholder="Drogas">
<button onclick="salvar()">Salvar</button>
</div>
</div>

<div id="ranking" style="display:none">
<div class="card">
<table><tbody id="rankingTabela"></tbody></table>
</div>
</div>

<div id="cadastro" style="display:none">
<div class="card">
<input id="nome" placeholder="Nome">
<input id="rg" placeholder="RG">
<button onclick="cadastrar()">Cadastrar</button>
<table><tbody id="lista"></tbody></table>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "sistema-coe-ff00a.firebaseapp.com",
  projectId: "sistema-coe-ff00a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let policiais = [];
let dados = [];

window.mostrar = function(t){
  relatorio.style.display="none";
  ranking.style.display="none";
  cadastro.style.display="none";
  document.getElementById(t).style.display="block";
}

window.cadastrar = async function(){
  await addDoc(collection(db,"policiais"),{
    nome:nome.value,
    rg:rg.value
  });
  carregarPoliciais();
}

async function carregarPoliciais(){
  let snap = await getDocs(collection(db,"policiais"));
  lista.innerHTML="";
  chefe.innerHTML="";
  policiais=[];
  snap.forEach(d=>{
    let p=d.data();
    policiais.push(p);
    lista.innerHTML+=`<tr><td>${p.nome}</td></tr>`;
    chefe.innerHTML+=`<option>${p.nome}</option>`;
  });
}

window.salvar = async function(){
  let r={
    chefe:chefe.value,
    veiculos:+veiculos.value||0,
    drogas:+drogas.value||0
  };
  r.pontos=r.veiculos*25+r.drogas*15;

  await addDoc(collection(db,"relatorios"),r);
  carregarRelatorios();
}

async function carregarRelatorios(){
  let snap=await getDocs(collection(db,"relatorios"));
  dados=[];
  snap.forEach(d=>dados.push(d.data()));
  gerarRanking();
}

function gerarRanking(){
  let r={};
  dados.forEach(d=>{
    if(!r[d.chefe])r[d.chefe]=0;
    r[d.chefe]+=d.pontos;
  });

  rankingTabela.innerHTML="";
  Object.entries(r).forEach(e=>{
    rankingTabela.innerHTML+=`<tr><td>${e[0]}</td><td>${e[1]}</td></tr>`;
  });
}

carregarPoliciais();
carregarRelatorios();
</script>

</body>
</html>
