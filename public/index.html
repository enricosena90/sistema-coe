<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema 💀</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; display:flex; background:#020617; color:white; }
.sidebar { width:230px; background:#020617; border-right:2px solid #22c55e; padding:20px; }
.logo { color:#22c55e; margin-bottom:20px; font-weight:bold; }
.menu-item { padding:10px; cursor:pointer; border-radius:5px; }
.menu-item:hover { background:#22c55e; color:black; }
.content { flex:1; padding:20px; }
.card { background:#020617; border:1px solid #22c55e; padding:15px; border-radius:10px; margin-bottom:20px; }
.grid { display:flex; flex-wrap:wrap; gap:10px; }
.grid div { flex:1 1 200px; }
input,select { width:100%; padding:10px; background:black; color:white; border:1px solid #22c55e; }
button { padding:10px; background:#22c55e; border:none; cursor:pointer; margin-top:10px; }
table { width:100%; border-collapse:collapse; }
th,td { padding:8px; border-bottom:1px solid #22c55e; text-align:center; font-size:12px; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">💀 COE</div>
  <div class="menu-item" onclick="mostrar('relatorio')">Relatório</div>
  <div class="menu-item" onclick="mostrar('ranking')">Ranking</div>
  <div class="menu-item" onclick="mostrar('cadastro')">Cadastro</div>

  <div class="menu-item" onclick="resetarSistema()" style="background:red;color:white;margin-top:20px;">
    💀 Resetar
  </div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">
<div class="card">
<h3>Equipe</h3>
<div class="grid">
<select id="chefe"></select>
<select id="p1"></select>
<select id="p3"></select>
<select id="p4"></select>
</div>
</div>

<div class="card">
<input type="date" id="data">
</div>

<div class="card">
<div class="grid">
<input id="veiculos" type="number" placeholder="Veículos">
<input id="drogas" type="number" placeholder="Drogas">
<input id="fuzil" type="number" placeholder="Fuzil">
<input id="pistola" type="number" placeholder="Pistola">
<input id="smg" type="number" placeholder="SMG">
<input id="explosivos" type="number" placeholder="Explosivos">
<input id="dinheiro" type="number" placeholder="Dinheiro">
<input id="municoes" type="number" placeholder="Munições">
</div>
</div>

<button onclick="salvar()">Salvar</button>

<canvas id="grafico"></canvas>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
<div class="card">
<table>
<thead>
<tr>
<th>#</th><th>Nome</th><th>Pts</th>
<th>🚗</th><th>💊</th><th>FZ</th><th>PT</th><th>SMG</th><th>💣</th><th>💰</th><th>🔸</th>
</tr>
</thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none;">
<div class="card">
<input id="nome" placeholder="Nome">
<input id="rg" placeholder="RG">
<input id="patente" placeholder="Patente">
<button onclick="cadastrar()">Cadastrar</button>
<table><tbody id="lista"></tbody></table>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBiv7jmqW6ELU6yxCSu7n18Qy_SHrbRmw4",
authDomain:"sistema-coe-ff00a.firebaseapp.com",
projectId:"sistema-coe-ff00a"
});

const db = getFirestore(app);

let dados=[];
let grafico;

/* CADASTRO */
window.cadastrar=async()=>{
await addDoc(collection(db,"policiais"),{
nome:nome.value,rg:rg.value,patente:patente.value
});
};

/* EXCLUIR */
window.excluirPolicial=async(id)=>{
if(confirm("Excluir?"))
await deleteDoc(doc(db,"policiais",id));
};

/* RESET */
window.resetarSistema=async()=>{
let s=prompt("Senha:");
if(s!=="1510") return alert("Errado");
if(!confirm("Apagar tudo?")) return;

let p=await getDocs(collection(db,"policiais"));
p.forEach(d=>deleteDoc(doc(db,"policiais",d.id)));

let r=await getDocs(collection(db,"relatorios"));
r.forEach(d=>deleteDoc(doc(db,"relatorios",d.id)));

alert("Resetado");
};

/* TEMPO REAL */
window.onload=()=>{

onSnapshot(collection(db,"policiais"),snap=>{
lista.innerHTML="";
chefe.innerHTML=p1.innerHTML=p3.innerHTML=p4.innerHTML="<option></option>";

snap.forEach(d=>{
let p=d.data();

lista.innerHTML+=`
<tr>
<td>${p.nome}</td>
<td><button onclick="excluirPolicial('${d.id}')">🗑️</button></td>
</tr>`;

[chefe,p1,p3,p4].forEach(s=>s.innerHTML+=`<option>${p.nome}</option>`);
});
});

onSnapshot(collection(db,"relatorios"),snap=>{
dados=[];
snap.forEach(d=>dados.push(d.data()));
ranking();
graf();
});

};

/* PONTOS */
function pts(d){
return d.veiculos*25+d.drogas*15+d.fuzil*40+d.pistola*10+d.smg*15+d.explosivos*15+d.dinheiro*0.2+d.municoes*5;
}

/* SALVAR */
window.salvar=async()=>{
let d={
chefe:chefe.value,p1:p1.value,p3:p3.value,p4:p4.value,data:data.value,
veiculos:+veiculos.value||0,drogas:+drogas.value||0,fuzil:+fuzil.value||0,
pistola:+pistola.value||0,smg:+smg.value||0,explosivos:+explosivos.value||0,
dinheiro:+dinheiro.value||0,municoes:+municoes.value||0
};
d.pontos=pts(d);
await addDoc(collection(db,"relatorios"),d);
};

/* RANKING */
function ranking(){
let r={};

dados.forEach(d=>{
[d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
if(!p)return;

if(!r[p]) r[p]={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0,pontos:0};

r[p].veiculos+=d.veiculos/4;
r[p].drogas+=d.drogas/4;
r[p].fuzil+=d.fuzil/4;
r[p].pistola+=d.pistola/4;
r[p].smg+=d.smg/4;
r[p].explosivos+=d.explosivos/4;
r[p].dinheiro+=d.dinheiro/4;
r[p].municoes+=d.municoes/4;
r[p].pontos+=d.pontos/4;
});
});

let ord=Object.entries(r).sort((a,b)=>b[1].pontos-a[1].pontos);

rankingTabela.innerHTML="";
ord.forEach((e,i)=>{
let d=e[1];
rankingTabela.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${e[0]}</td>
<td>${d.pontos.toFixed(1)}</td>
<td>${d.veiculos.toFixed(0)}</td>
<td>${d.drogas.toFixed(0)}</td>
<td>${d.fuzil.toFixed(0)}</td>
<td>${d.pistola.toFixed(0)}</td>
<td>${d.smg.toFixed(0)}</td>
<td>${d.explosivos.toFixed(0)}</td>
<td>${d.dinheiro.toFixed(0)}</td>
<td>${d.municoes.toFixed(0)}</td>
</tr>`;
});
}

/* GRAFICO */
function graf(){
let t={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0};

dados.forEach(d=>{
t.veiculos+=d.veiculos;
t.drogas+=d.drogas;
t.fuzil+=d.fuzil;
t.pistola+=d.pistola;
t.smg+=d.smg;
t.explosivos+=d.explosivos;
t.dinheiro+=d.dinheiro;
t.municoes+=d.municoes;
});

if(grafico) grafico.destroy();

grafico=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{labels:Object.keys(t),datasets:[{data:Object.values(t)}]}
});
}

/* NAV */
window.mostrar=(id)=>{
["relatorio","ranking","cadastro"].forEach(p=>{
document.getElementById(p).style.display="none";
});
document.getElementById(id).style.display="block";
};
</script>

</body>
</html>
