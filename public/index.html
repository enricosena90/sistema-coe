<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #05080f;
  color: #fff;
}

.sidebar {
  width: 240px;
  background: #0a0f1a;
  height: 100vh;
  padding: 20px;
}

.logo {
  color: #facc15;
  margin-bottom: 20px;
  font-weight: bold;
}

.menu-item {
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

.menu-item:hover {
  background: #facc15;
  color: #000;
}

.content {
  flex: 1;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.grid input {
  flex: 1 1 180px;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
  background: #020617;
  color: white;
}

button {
  padding: 10px 15px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  border-radius: 5px;
  font-weight: bold;
  margin-top: 10px;
}

.reset-btn {
  background: #ef4444;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #020617;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #1e293b;
}

th {
  color: #38bdf8;
}

tr:hover {
  background: #0f172a;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🚔 COE</div>
  <div class="menu-item" onclick="mostrarRelatorio()">Relatório</div>
  <div class="menu-item" onclick="mostrarRanking()">Ranking Geral</div>
  <div class="menu-item" onclick="mostrarRankingMensal()">Ranking Mensal</div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">

<div class="card">
<h3>Equipe</h3>
<div class="grid">
<input id="chefe" placeholder="Chefe">
<input id="p1" placeholder="P1">
<input id="p3" placeholder="P3">
<input id="p4" placeholder="P4">
</div>
</div>

<div class="card">
<h3>Ronda</h3>
<div class="grid">
<input id="vtr" placeholder="VTR">
<input type="date" id="data">
<input type="time" id="inicio">
<input type="time" id="fim">
</div>
</div>

<div class="card">
<h3>Produtividade</h3>
<div class="grid">
<input id="veiculos" type="number" placeholder="Veículos">
<input id="drogas" type="number" placeholder="Drogas">
<input id="fuzil" type="number" placeholder="Fuzil">
<input id="pistola" type="number" placeholder="Pistola">
<input id="smg" type="number" placeholder="SMG">
<input id="explosivos" type="number" placeholder="Explosivos">
<input id="dinheiro" type="number" placeholder="Dinheiro Sujo">
<input id="municoes" type="number" placeholder="Munições">
</div>
</div>

<button onclick="salvar()">Salvar Relatório</button>
<button onclick="resetarDados()" class="reset-btn">🗑️ Resetar Sistema</button>

</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">

<div class="card">
<h3>🏆 Ranking Geral</h3>
<table>
<thead>
<tr>
<th>Posição</th>
<th>Chefe</th>
<th>Pontos</th>
</tr>
</thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>

<div class="card">
<h3>📊 Desempenho</h3>
<canvas id="grafico"></canvas>
</div>

</div>

<!-- RANKING MENSAL -->
<div id="rankingMensal" style="display:none;">
<div class="card">
<h3>📅 Ranking Mensal</h3>
<input type="month" id="mesFiltro" onchange="gerarRankingMensal()">
<table>
<thead>
<tr>
<th>Posição</th>
<th>Chefe</th>
<th>Pontos</th>
</tr>
</thead>
<tbody id="rankingMensalTabela"></tbody>
</table>
</div>
</div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let grafico;

/* PONTOS */
function calcularPontos(d) {
  return (
    (d.veiculos * 25) +
    (d.drogas * 15) +
    (d.fuzil * 40) +
    (d.pistola * 10) +
    (d.smg * 15) +
    (d.explosivos * 15) +
    (d.dinheiro * 10) +
    (d.municoes * 5)
  );
}

/* SALVAR */
function salvar() {
  if (!chefe.value) {
    alert("Preencha o Chefe");
    return;
  }

  let registro = {
    chefe: chefe.value,
    p1: p1.value,
    p3: p3.value,
    p4: p4.value,
    vtr: vtr.value,
    data: data.value,
    inicio: inicio.value,
    fim: fim.value,
    veiculos: Number(veiculos.value || 0),
    drogas: Number(drogas.value || 0),
    fuzil: Number(fuzil.value || 0),
    pistola: Number(pistola.value || 0),
    smg: Number(smg.value || 0),
    explosivos: Number(explosivos.value || 0),
    dinheiro: Number(dinheiro.value || 0),
    municoes: Number(municoes.value || 0)
  };

  registro.pontos = calcularPontos(registro);

  dados.push(registro);
  localStorage.setItem("dados", JSON.stringify(dados));

  limparCampos();
  gerarRanking();
  gerarRankingMensal();

  alert("Relatório salvo 🚔");
}

/* LIMPAR */
function limparCampos() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

/* RESET COM SENHA */
function resetarDados() {
  let senha = prompt("Digite a senha para resetar:");
  
  if (senha === "1234") {
    if (confirm("Tem certeza que deseja apagar tudo?")) {
      localStorage.removeItem("dados");
      dados = [];
      gerarRanking();
      gerarRankingMensal();
      alert("Sistema resetado 🚨");
    }
  } else {
    alert("Senha incorreta ❌");
  }
}

/* RANKING */
function gerarRanking() {
  let ranking = {};

  dados.forEach(d => {
    if (!ranking[d.chefe]) ranking[d.chefe] = 0;
    ranking[d.chefe] += d.pontos;
  });

  let ordenado = Object.entries(ranking).sort((a,b)=>b[1]-a[1]);

  rankingTabela.innerHTML = "";

  ordenado.forEach((r, i)=>{
    let medalha = "";
    if (i===0) medalha="🥇";
    else if (i===1) medalha="🥈";
    else if (i===2) medalha="🥉";

    rankingTabela.innerHTML += `
      <tr>
        <td>${medalha} ${i+1}º</td>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
      </tr>
    `;
  });

  gerarGrafico(ordenado);
}

/* GRAFICO */
function gerarGrafico(lista) {
  let nomes = lista.map(d=>d[0]);
  let pontos = lista.map(d=>d[1]);

  if (grafico) grafico.destroy();

  grafico = new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: nomes,
      datasets: [{
        data: pontos
      }]
    },
    options: {
      plugins: { legend: { display:false } }
    }
  });
}

/* RANKING MENSAL */
function gerarRankingMensal() {
  let mes = mesFiltro.value;
  if (!mes) return;

  let ranking = {};

  dados.forEach(d => {
    if (d.data && d.data.startsWith(mes)) {
      if (!ranking[d.chefe]) ranking[d.chefe] = 0;
      ranking[d.chefe] += d.pontos;
    }
  });

  let ordenado = Object.entries(ranking).sort((a,b)=>b[1]-a[1]);

  rankingMensalTabela.innerHTML = "";

  ordenado.forEach((r, i)=>{
    rankingMensalTabela.innerHTML += `
      <tr>
        <td>${i+1}º</td>
        <td>${r[0]}</td>
        <td>${r[1]}</td>
      </tr>
    `;
  });
}

/* NAVEGAÇÃO */
function mostrarRelatorio() {
  relatorio.style.display="block";
  ranking.style.display="none";
  rankingMensal.style.display="none";
}

function mostrarRanking() {
  relatorio.style.display="none";
  ranking.style.display="block";
  rankingMensal.style.display="none";
}

function mostrarRankingMensal() {
  relatorio.style.display="none";
  ranking.style.display="none";
  rankingMensal.style.display="block";
}

/* INICIO */
gerarRanking();
</script>

</body>
</html>
