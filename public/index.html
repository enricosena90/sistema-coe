<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema Online</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #020403;
  color: #d1fae5;
}

.sidebar {
  width: 240px;
  background: #03110a;
  height: 100vh;
  padding: 20px;
  border-right: 2px solid #14532d;
}

.logo {
  color: #22c55e;
  font-weight: bold;
  margin-bottom: 20px;
}

.menu-item {
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

.menu-item:hover {
  background: #22c55e;
  color: black;
}

.content {
  flex: 1;
  padding: 20px;
}

.card {
  background: #03110a;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: 1px solid #14532d;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  background: #020403;
  border: 1px solid #14532d;
  color: white;
}

button {
  padding: 10px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #14532d;
  text-align: center;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🚔 COE</div>
  <div class="menu-item" onclick="mostrar('relatorio')">Relatório</div>
  <div class="menu-item" onclick="mostrar('ranking')">Ranking</div>
  <div class="menu-item" onclick="mostrar('cadastro')">Cadastro</div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">
<div class="card">
<h3>Equipe</h3>
<select id="chefeSelect"></select>
<select id="p1Select"></select>
<select id="p3Select"></select>
<select id="p4Select"></select>
</div>

<div class="card">
<h3>Dados</h3>
<input type="date" id="data">
<input type="number" id="veiculos" placeholder="Veículos">
<input type="number" id="drogas" placeholder="Drogas">
<input type="number" id="fuzil" placeholder="Fuzil">
<input type="number" id="pistola" placeholder="Pistola">
<input type="number" id="smg" placeholder="SMG">
<input type="number" id="explosivos" placeholder="Explosivos">
<input type="number" id="dinheiro" placeholder="Dinheiro">
<input type="number" id="municoes" placeholder="Munições">
<button onclick="salvar()">Salvar</button>
</div>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
<div class="card">
<h3>Ranking</h3>
<table>
<thead><tr><th>#</th><th>Chefe</th><th>Pontos</th></tr></thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none;">
<div class="card">
<h3>Cadastro</h3>
<input id="nomePolicial" placeholder="Nome">
<input id="rgPolicial" placeholder="RG">
<input id="patentePolicial" placeholder="Patente">
<button onclick="cadastrarPolicial()">Cadastrar</button>

<table>
<thead><tr><th>Nome</th><th>RG</th><th>Patente</th><th>Ação</th></tr></thead>
<tbody id="listaPoliciais"></tbody>
</table>
</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiv7jmqW6ELU6yxCSu7n18Qy_SHrbRmw4",
  authDomain: "sistema-coe-ff00a.firebaseapp.com",
  projectId: "sistema-coe-ff00a",
  storageBucket: "sistema-coe-ff00a.firebasestorage.app",
  messagingSenderId: "275693831669",
  appId: "1:275693831669:web:9a6364da25414b3d28ccbc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let policiais = [];
let dados = [];

/* CADASTRO */
window.cadastrarPolicial = async function () {
  await addDoc(collection(db, "policiais"), {
    nome: nomePolicial.value,
    rg: rgPolicial.value,
    patente: patentePolicial.value
  });
  carregarPoliciais();
};

window.excluirPolicial = async function (id) {
  await deleteDoc(doc(db, "policiais", id));
  carregarPoliciais();
};

async function carregarPoliciais() {
  const q = await getDocs(collection(db, "policiais"));
  policiais = [];
  listaPoliciais.innerHTML = "";

  q.forEach(d => {
    let p = d.data();
    p.id = d.id;
    policiais.push(p);

    listaPoliciais.innerHTML += `
      <tr>
        <td>${p.nome}</td>
        <td>${p.rg}</td>
        <td>${p.patente}</td>
        <td><button onclick="excluirPolicial('${p.id}')">Excluir</button></td>
      </tr>`;
  });

  atualizarSelects();
}

function atualizarSelects() {
  [chefeSelect,p1Select,p3Select,p4Select].forEach(s=>{
    s.innerHTML="<option>Selecionar</option>";
    policiais.forEach(p=>{
      s.innerHTML+=`<option value="${p.nome}">${p.patente} ${p.nome}</option>`;
    });
  });
}

/* RELATORIO */
window.salvar = async function () {
  await addDoc(collection(db, "relatorios"), {
    chefe: chefeSelect.value,
    data: data.value,
    veiculos:+veiculos.value||0,
    drogas:+drogas.value||0,
    fuzil:+fuzil.value||0,
    pistola:+pistola.value||0,
    smg:+smg.value||0,
    explosivos:+explosivos.value||0,
    dinheiro:+dinheiro.value||0,
    municoes:+municoes.value||0
  });

  carregarRelatorios();
};

async function carregarRelatorios() {
  const q = await getDocs(collection(db, "relatorios"));
  dados = [];
  q.forEach(d => dados.push(d.data()));
  gerarRanking();
}

function calcular(d){
return d.veiculos*25+d.drogas*15+d.fuzil*40+d.pistola*10+d.smg*15+d.explosivos*15+d.dinheiro*0.2+d.municoes*5;
}

function gerarRanking(){
let r={};
dados.forEach(d=>{
let p=calcular(d);
if(!r[d.chefe])r[d.chefe]=0;
r[d.chefe]+=p;
});

let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);

rankingTabela.innerHTML="";
ord.forEach((e,i)=>{
let m=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";
rankingTabela.innerHTML+=`<tr><td>${m} ${i+1}</td><td>${e[0]}</td><td>${e[1]}</td></tr>`;
});
}

/* NAV */
window.mostrar = function(sec){
document.getElementById("relatorio").style.display="none";
document.getElementById("ranking").style.display="none";
document.getElementById("cadastro").style.display="none";
document.getElementById(sec).style.display="block";
}

/* INIT */
carregarPoliciais();
carregarRelatorios();

</script>

</body>
</html>
</html>
