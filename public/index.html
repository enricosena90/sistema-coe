<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema 💀</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; display:flex; background:#020617; color:white; }
.sidebar { width:230px; background:#020617; border-right:2px solid #22c55e; padding:20px; }
.logo { color:#22c55e; margin-bottom:20px; font-weight:bold; }
.menu-item { padding:10px; cursor:pointer; border-radius:5px; }
.menu-item:hover { background:#22c55e; color:black; }
.content { flex:1; padding:20px; }
.card { background:#020617; border:1px solid #22c55e; padding:15px; border-radius:10px; margin-bottom:20px; }
.grid { display:flex; flex-wrap:wrap; gap:10px; }
.grid div { flex:1 1 200px; }
input,select { width:100%; padding:10px; background:black; color:white; border:1px solid #22c55e; }
button { padding:10px; background:#22c55e; border:none; cursor:pointer; margin-top:10px; }
table { width:100%; border-collapse:collapse; }
th,td { padding:10px; border-bottom:1px solid #22c55e; text-align:center; }
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">💀 COE</div>
  <div class="menu-item" onclick="mostrar('relatorio')">Relatório</div>
  <div class="menu-item" onclick="mostrar('ranking')">Ranking</div>
  <div class="menu-item" onclick="mostrar('mensal')">Ranking Mensal</div>
  <div class="menu-item" onclick="mostrar('individual')">Ranking Individual</div>
  <div class="menu-item" onclick="mostrar('cadastro')">Cadastro</div>

  <div class="menu-item" onclick="resetarSistema()" style="background:red;color:white;margin-top:20px;">
    💀 Resetar Sistema
  </div>
</div>

<div class="content">

<div id="relatorio">
<div class="card">
<h3>Equipe</h3>
<div class="grid">
<div><label>Chefe</label><select id="chefe"></select></div>
<div><label>P1</label><select id="p1"></select></div>
<div><label>P3</label><select id="p3"></select></div>
<div><label>P4</label><select id="p4"></select></div>
</div>
</div>

<div class="card">
<h3>Ronda</h3>
<div class="grid">
<input type="date" id="data">
</div>
</div>

<div class="card">
<h3>Produtividade</h3>
<div class="grid">
<input id="veiculos" type="number" placeholder="Veículos">
<input id="drogas" type="number" placeholder="Drogas">
<input id="fuzil" type="number" placeholder="Fuzil">
<input id="pistola" type="number" placeholder="Pistola">
<input id="smg" type="number" placeholder="SMG">
<input id="explosivos" type="number" placeholder="Explosivos">
<input id="dinheiro" type="number" placeholder="Dinheiro">
<input id="municoes" type="number" placeholder="Munições">
</div>
</div>

<button onclick="salvar()">Salvar</button>
</div>

<div id="ranking" style="display:none;">
<div class="card">
<h3>🏆 Ranking</h3>
<table>
<thead><tr><th>#</th><th>Nome</th><th>Pontos</th></tr></thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>
</div>

<div id="mensal" style="display:none;">
<div class="card">
<input type="month" id="mes" onchange="rankingMensal()">
<table><tbody id="mensalTabela"></tbody></table>
</div>
</div>

<div id="individual" style="display:none;">
<div class="card">
<table><tbody id="individualTabela"></tbody></table>
</div>
</div>

<div id="cadastro" style="display:none;">
<div class="card">
<input id="nome" placeholder="Nome">
<input id="rg" placeholder="RG">
<input id="patente" placeholder="Patente">
<button onclick="cadastrar()">Cadastrar</button>
<table><tbody id="lista"></tbody></table>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiv7jmqW6ELU6yxCSu7n18Qy_SHrbRmw4",
  authDomain: "sistema-coe-ff00a.firebaseapp.com",
  projectId: "sistema-coe-ff00a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ELEMENTOS */
const nomeInput = document.getElementById("nome");
const rgInput = document.getElementById("rg");
const patenteInput = document.getElementById("patente");

const lista = document.getElementById("lista");
const chefe = document.getElementById("chefe");
const p1 = document.getElementById("p1");
const p3 = document.getElementById("p3");
const p4 = document.getElementById("p4");

const rankingTabela = document.getElementById("rankingTabela");
const mensalTabela = document.getElementById("mensalTabela");
const individualTabela = document.getElementById("individualTabela");
const mesInput = document.getElementById("mes");

let dados = [];

/* CADASTRO */
window.cadastrar = async ()=>{
  if(!nomeInput.value) return alert("Digite o nome");

  await addDoc(collection(db,"policiais"),{
    nome:nomeInput.value,
    rg:rgInput.value,
    patente:patenteInput.value
  });

  nomeInput.value="";
  rgInput.value="";
  patenteInput.value="";
};

/* TEMPO REAL */
window.addEventListener("load", ()=>{

  onSnapshot(collection(db,"policiais"), snap=>{
    lista.innerHTML="";
    chefe.innerHTML="<option></option>";
    p1.innerHTML="<option></option>";
    p3.innerHTML="<option></option>";
    p4.innerHTML="<option></option>";

    snap.forEach(doc=>{
      let p = doc.data();

      lista.innerHTML += `<tr><td>${p.nome} (${p.patente})</td></tr>`;

      [chefe,p1,p3,p4].forEach(s=>{
        s.innerHTML += `<option value="${p.nome}">${p.nome}</option>`;
      });
    });
  });

  onSnapshot(collection(db,"relatorios"), snap=>{
    dados = [];

    snap.forEach(doc=>{
      dados.push(doc.data());
    });

    gerarRanking();
    rankingMensal();
    rankingIndividual();
  });

});

/* PONTOS */
function pontos(d){
return d.veiculos*25+d.drogas*15+d.fuzil*40+d.pistola*10+d.smg*15+d.explosivos*15+d.dinheiro*0.2+d.municoes*5;
}

/* SALVAR */
window.salvar = async ()=>{
  let d={
    chefe:chefe.value,
    p1:p1.value,
    p3:p3.value,
    p4:p4.value,
    data:document.getElementById("data").value,
    veiculos:+document.getElementById("veiculos").value||0,
    drogas:+document.getElementById("drogas").value||0,
    fuzil:+document.getElementById("fuzil").value||0,
    pistola:+document.getElementById("pistola").value||0,
    smg:+document.getElementById("smg").value||0,
    explosivos:+document.getElementById("explosivos").value||0,
    dinheiro:+document.getElementById("dinheiro").value||0,
    municoes:+document.getElementById("municoes").value||0
  };

  d.pontos = pontos(d);

  await addDoc(collection(db,"relatorios"), d);

  alert("Salvo com sucesso 🚀");
};

/* RESET COM SENHA */
window.resetarSistema = async () => {

  const senha = prompt("🔐 Digite a senha para resetar:");
  if (senha !== "1510") return alert("❌ Senha incorreta");

  if (!confirm("⚠️ Apagar TODOS os dados?")) return;

  const policiaisSnap = await getDocs(collection(db,"policiais"));
  for (const d of policiaisSnap.docs) {
    await deleteDoc(doc(db,"policiais",d.id));
  }

  const relatoriosSnap = await getDocs(collection(db,"relatorios"));
  for (const d of relatoriosSnap.docs) {
    await deleteDoc(doc(db,"relatorios",d.id));
  }

  alert("🔥 Sistema resetado");
};

/* RANKINGS */
function gerarRanking(){
let r={};
dados.forEach(d=>{
if(!d.chefe)return;
r[d.chefe]=(r[d.chefe]||0)+d.pontos;
});
let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);
rankingTabela.innerHTML="";
ord.forEach((e,i)=>{
rankingTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${e[1].toFixed(1)}</td></tr>`;
});
}

window.rankingMensal=()=>{
let mes=mesInput.value;
let r={};
dados.forEach(d=>{
 if(d.data && mes && d.data.startsWith(mes)){
  r[d.chefe]=(r[d.chefe]||0)+d.pontos;
 }
});
let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);
mensalTabela.innerHTML="";
ord.forEach((e,i)=>{
mensalTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${e[1].toFixed(1)}</td></tr>`;
});
};

function rankingIndividual(){
let r={};
dados.forEach(d=>{
[d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
if(!p)return;
r[p]=(r[p]||0)+d.pontos/4;
});
});
let ord=Object.entries(r).sort((a,b)=>b[1]-a[1]);
individualTabela.innerHTML="";
ord.forEach((e,i)=>{
individualTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${e[1].toFixed(1)}</td></tr>`;
});
}

/* NAV */
window.mostrar=(id)=>{
["relatorio","ranking","mensal","individual","cadastro"].forEach(p=>{
document.getElementById(p).style.display="none";
});
document.getElementById(id).style.display="block";
};
</script>

</body>
</html>
