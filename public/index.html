<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  background: #020617;
  color: #e2e8f0;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: linear-gradient(180deg,#020617,#022c22);
  height: 100vh;
  padding: 20px;
}

.logo {
  color: #22c55e;
  font-size: 20px;
  margin-bottom: 20px;
}

.menu-item {
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

.menu-item:hover {
  background: #22c55e;
  color: black;
}

/* CONTENT */
.content {
  flex: 1;
  padding: 20px;
}

.card {
  background: #020617;
  border: 1px solid #065f46;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

h3 {
  color: #22c55e;
}

.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.grid div {
  flex: 1 1 180px;
}

input, select {
  width: 100%;
  padding: 10px;
  background: black;
  border: 1px solid #065f46;
  color: #22c55e;
}

button {
  padding: 10px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.reset-btn {
  background: red;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #065f46;
}

th {
  color: #22c55e;
}

</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">☠️ COE ELITE</div>
  <div class="menu-item" onclick="mostrarRelatorio()">Relatório</div>
  <div class="menu-item" onclick="mostrarRanking()">Ranking</div>
  <div class="menu-item" onclick="mostrarCadastro()">Cadastro</div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">

<div class="card">
<h3>Equipe</h3>
<div class="grid">

<div>
<label>Chefe da Barca</label>
<select id="chefeSelect"></select>
</div>

<div>
<label>P1</label>
<select id="p1Select"></select>
</div>

<div>
<label>P3</label>
<select id="p3Select"></select>
</div>

<div>
<label>P4</label>
<select id="p4Select"></select>
</div>

</div>
</div>

<div class="card">
<h3>Produtividade</h3>
<div class="grid">
<input id="veiculos" type="number" placeholder="Veículos">
<input id="drogas" type="number" placeholder="Drogas">
<input id="fuzil" type="number" placeholder="Fuzil">
<input id="pistola" type="number" placeholder="Pistola">
<input id="smg" type="number" placeholder="SMG">
<input id="explosivos" type="number" placeholder="Explosivos">
<input id="dinheiro" type="number" placeholder="Dinheiro Sujo">
<input id="municoes" type="number" placeholder="Munições">
</div>
</div>

<button onclick="salvar()">Salvar Relatório</button>

</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
<div class="card">
<h3>🏆 Ranking COE</h3>
<table>
<thead>
<tr>
<th>Posição</th>
<th>Policial</th>
<th>Pontos</th>
<th>Detalhes</th>
</tr>
</thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none;">
<div class="card">

<h3>Cadastro</h3>

<div class="grid">
<input id="nomePolicial" placeholder="Nome">
<input id="rgPolicial" placeholder="RG">
<input id="patentePolicial" placeholder="Patente">
</div>

<button onclick="cadastrarPolicial()">Cadastrar</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>RG</th>
<th>Patente</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="listaPoliciais"></tbody>
</table>

</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_AUTH",
  projectId: "SEU_PROJECT",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let policiais = [];
let dados = [];

/* CADASTRO */
window.cadastrarPolicial = async function(){
  let p={
    nome:nomePolicial.value,
    rg:rgPolicial.value,
    patente:patentePolicial.value
  };

  await addDoc(collection(db,"policiais"),p);
  carregarPoliciais();
}

/* CARREGAR */
async function carregarPoliciais(){
  let snap=await getDocs(collection(db,"policiais"));
  policiais=[];
  listaPoliciais.innerHTML="";

  snap.forEach(docu=>{
    let p=docu.data();
    policiais.push(p);

    listaPoliciais.innerHTML+=`
    <tr>
    <td>${p.nome}</td>
    <td>${p.rg}</td>
    <td>${p.patente}</td>
    </tr>`;
  });

  atualizarSelects();
}

/* SELECT */
function atualizarSelects(){
  let selects=[chefeSelect,p1Select,p3Select,p4Select];

  selects.forEach(s=>{
    s.innerHTML="<option>Selecionar</option>";
    policiais.forEach(p=>{
      s.innerHTML+=`<option>${p.nome} (${p.patente})</option>`;
    });
  });
}

/* SALVAR */
window.salvar = async function(){

  let d={
    chefe:chefeSelect.value,
    veiculos:+veiculos.value||0,
    drogas:+drogas.value||0,
    fuzil:+fuzil.value||0,
    pistola:+pistola.value||0,
    smg:+smg.value||0,
    explosivos:+explosivos.value||0,
    dinheiro:+dinheiro.value||0,
    municoes:+municoes.value||0
  };

  await addDoc(collection(db,"relatorios"),d);
  carregarRanking();
}

/* RANKING */
async function carregarRanking(){

  let snap=await getDocs(collection(db,"relatorios"));
  let r={};

  snap.forEach(docu=>{
    let d=docu.data();

    if(!r[d.chefe]) r[d.chefe]={pontos:0,detalhe:""};

    let pontos = d.fuzil*40 + d.pistola*10 + d.smg*15 + d.veiculos*25;

    r[d.chefe].pontos+=pontos;

    r[d.chefe].detalhe += `F:${d.fuzil} P:${d.pistola} `;
  });

  let ord=Object.entries(r).sort((a,b)=>b[1].pontos-a[1].pontos);

  rankingTabela.innerHTML="";

  ord.forEach((e,i)=>{
    rankingTabela.innerHTML+=`
    <tr>
    <td>${i+1}</td>
    <td>${e[0]}</td>
    <td>${e[1].pontos}</td>
    <td>${e[1].detalhe}</td>
    </tr>`;
  });
}

/* NAV */
window.mostrarRelatorio=()=>{relatorio.style.display="block";ranking.style.display="none";cadastro.style.display="none";}
window.mostrarRanking=()=>{relatorio.style.display="none";ranking.style.display="block";cadastro.style.display="none";carregarRanking();}
window.mostrarCadastro=()=>{relatorio.style.display="none";ranking.style.display="none";cadastro.style.display="block";}

/* INIT */
carregarPoliciais();

</script>

</body>
</html>
