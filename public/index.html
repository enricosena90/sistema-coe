<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>COE Sistema 💀</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#020617; color:white; }
.sidebar { width:230px; background:#020617; border-right:2px solid #22c55e; padding:20px; height:100vh; position:fixed; }
.content { margin-left:250px; padding:20px; }
.menu-item { padding:10px; cursor:pointer; }
.card { border:1px solid #22c55e; padding:10px; margin-bottom:10px; }
input,select { width:100%; padding:8px; margin:5px 0; background:black; color:white; border:1px solid #22c55e; }
button { padding:8px; background:#22c55e; border:none; cursor:pointer; }
table { width:100%; border-collapse:collapse; }
td,th { border-bottom:1px solid #22c55e; padding:5px; text-align:center; font-size:12px; }
</style>
</head>

<body>

<div class="sidebar">
<div class="menu-item" onclick="mostrar('relatorio')">Relatório</div>
<div class="menu-item" onclick="mostrar('ranking')">Ranking</div>
<div class="menu-item" onclick="mostrar('mensal')">Ranking Mensal</div>
<div class="menu-item" onclick="mostrar('individual')">Ranking Individual</div>
<div class="menu-item" onclick="mostrar('cadastro')">Cadastro</div>
<div class="menu-item" onclick="resetarSistema()" style="color:red;">Reset</div>
</div>

<div class="content">

<!-- RELATORIO -->
<div id="relatorio">
<div class="card">
<h3>Equipe</h3>
<label>Chefe da Barca</label><select id="chefe"></select>
<label>P1</label><select id="p1"></select>
<label>P3</label><select id="p3"></select>
<label>P4</label><select id="p4"></select>
</div>

<div class="card">
<h3>Ronda</h3>
<input id="vtr" placeholder="Viatura">
<input type="date" id="data">
<input type="time" id="inicio">
<input type="time" id="fim">
</div>

<div class="card">
<h3>Produtividade</h3>
<input id="veiculos" placeholder="Veículos">
<input id="drogas" placeholder="Drogas">
<input id="fuzil" placeholder="Fuzil">
<input id="pistola" placeholder="Pistola">
<input id="smg" placeholder="SMG">
<input id="explosivos" placeholder="Explosivos">
<input id="dinheiro" placeholder="Dinheiro">
<input id="municoes" placeholder="Munições">
</div>

<button onclick="salvar()">Salvar</button>
<canvas id="grafico"></canvas>
</div>

<!-- RANKING -->
<div id="ranking" style="display:none;">
<table>
<thead>
<tr>
<th>#</th><th>Nome</th><th>Pts</th>
<th>🚗</th><th>💊</th><th>FZ</th><th>PT</th><th>SMG</th><th>💣</th><th>💰</th><th>🔸</th>
</tr>
</thead>
<tbody id="rankingTabela"></tbody>
</table>
</div>

<!-- MENSAL -->
<div id="mensal" style="display:none;">
<input type="month" id="mes" onchange="rankingMensal()">
<table><tbody id="mensalTabela"></tbody></table>
</div>

<!-- INDIVIDUAL -->
<div id="individual" style="display:none;">
<table><tbody id="individualTabela"></tbody></table>
</div>

<!-- CADASTRO -->
<div id="cadastro" style="display:none;">
<input id="nome" placeholder="Nome">
<input id="rg" placeholder="RG">
<input id="patente" placeholder="Patente">
<button onclick="cadastrar()">Cadastrar</button>
<table><tbody id="lista"></tbody></table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyBiv7jmqW6ELU6yxCSu7n18Qy_SHrbRmw4",
authDomain:"sistema-coe-ff00a.firebaseapp.com",
projectId:"sistema-coe-ff00a"
});

const db = getFirestore(app);

let dados=[];
let grafico;

/* CADASTRO */
window.cadastrar=async()=>{
await addDoc(collection(db,"policiais"),{
nome:nome.value,rg:rg.value,patente:patente.value
});
};

/* EXCLUIR */
window.excluir=id=>{
if(confirm("Excluir policial?"))
deleteDoc(doc(db,"policiais",id));
};

/* RESET */
window.resetarSistema=async()=>{
if(prompt("Senha")!=="1510")return;
let p=await getDocs(collection(db,"policiais"));
p.forEach(d=>deleteDoc(doc(db,"policiais",d.id)));
let r=await getDocs(collection(db,"relatorios"));
r.forEach(d=>deleteDoc(doc(db,"relatorios",d.id)));
};

/* TEMPO REAL */
window.onload=()=>{
onSnapshot(collection(db,"policiais"),snap=>{
lista.innerHTML="";
chefe.innerHTML=p1.innerHTML=p3.innerHTML=p4.innerHTML="<option></option>";
snap.forEach(d=>{
let p=d.data();
lista.innerHTML+=`<tr><td>${p.nome}</td><td><button onclick="excluir('${d.id}')">🗑️</button></td></tr>`;
[chefe,p1,p3,p4].forEach(s=>s.innerHTML+=`<option>${p.nome}</option>`);
});
});

onSnapshot(collection(db,"relatorios"),snap=>{
dados=[];
snap.forEach(d=>dados.push(d.data()));
ranking();
rankingMensal();
rankingIndividual();
graf();
});
};

/* PONTOS */
function pts(d){
return d.veiculos*25+d.drogas*15+d.fuzil*40+d.pistola*10+d.smg*15+d.explosivos*15+d.dinheiro*0.2+d.municoes*5;
}

/* SALVAR */
window.salvar=async()=>{
let d={
chefe:chefe.value,p1:p1.value,p3:p3.value,p4:p4.value,
vtr:vtr.value,data:data.value,inicio:inicio.value,fim:fim.value,
veiculos:+veiculos.value||0,drogas:+drogas.value||0,fuzil:+fuzil.value||0,
pistola:+pistola.value||0,smg:+smg.value||0,explosivos:+explosivos.value||0,
dinheiro:+dinheiro.value||0,municoes:+municoes.value||0
};
d.pontos=pts(d);
await addDoc(collection(db,"relatorios"),d);
};

/* RANKING */
function ranking(){
let r={};
dados.forEach(d=>{
[d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
if(!p)return;
if(!r[p])r[p]={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0,pontos:0};
Object.keys(r[p]).forEach(k=>{
if(k!=="pontos")r[p][k]+=d[k]/4;
});
r[p].pontos+=d.pontos/4;
});
});
let ord=Object.entries(r).sort((a,b)=>b[1].pontos-a[1].pontos);
rankingTabela.innerHTML="";
ord.forEach((e,i)=>{
let d=e[1];
rankingTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${d.pontos.toFixed(1)}</td>
<td>${d.veiculos.toFixed(0)}</td><td>${d.drogas.toFixed(0)}</td>
<td>${d.fuzil.toFixed(0)}</td><td>${d.pistola.toFixed(0)}</td>
<td>${d.smg.toFixed(0)}</td><td>${d.explosivos.toFixed(0)}</td>
<td>${d.dinheiro.toFixed(0)}</td><td>${d.municoes.toFixed(0)}</td></tr>`;
});
}

/* MENSAL */
window.rankingMensal=()=>{
let m=mes.value;
let r={};
dados.forEach(d=>{
if(d.data && d.data.startsWith(m)){
r[d.chefe]=(r[d.chefe]||0)+d.pontos;
}
});
mensalTabela.innerHTML="";
Object.entries(r).forEach((e,i)=>{
mensalTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${e[1]}</td></tr>`;
});
};

/* INDIVIDUAL */
function rankingIndividual(){
let r={};
dados.forEach(d=>{
[d.chefe,d.p1,d.p3,d.p4].forEach(p=>{
if(!p)return;
r[p]=(r[p]||0)+d.pontos/4;
});
});
individualTabela.innerHTML="";
Object.entries(r).forEach((e,i)=>{
individualTabela.innerHTML+=`<tr><td>${i+1}</td><td>${e[0]}</td><td>${e[1].toFixed(1)}</td></tr>`;
});
}

/* GRAFICO */
function graf(){
let t={veiculos:0,drogas:0,fuzil:0,pistola:0,smg:0,explosivos:0,dinheiro:0,municoes:0};
dados.forEach(d=>Object.keys(t).forEach(k=>t[k]+=d[k]));
if(grafico)grafico.destroy();
grafico=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{labels:Object.keys(t),datasets:[{data:Object.values(t)}]}
});
}

/* NAV */
window.mostrar=id=>{
["relatorio","ranking","mensal","individual","cadastro"].forEach(p=>document.getElementById(p).style.display="none");
document.getElementById(id).style.display="block";
};
</script>

</body>
</html>
